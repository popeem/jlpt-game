<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JLPT Simulator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  width: 420px;
  margin: auto;
  margin-top: 30px;
}

button {
  margin: 5px;
  padding: 10px;
  width: 80%;
  border-radius: 10px;
  border: none;
  background: #334155;
  color: white;
  cursor: pointer;
}

.selected {
  background: #22c55e !important;
}

#progress {
  height: 10px;
  background: red;
  width: 100%;
  margin-bottom: 10px;
}

#game, #dashboard {
  display: none;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="card" id="menu">
  <h1>🎮 JLPT Simulator</h1>

  <h3>Mode</h3>
  <button onclick="startMode('easy')">Easy</button>
  <button onclick="startMode('normal')">Normal</button>
  <button onclick="startMode('hard')">Hard</button>

  <h3>Lesson</h3>
  <div id="lessonList"></div>
</div>

<!-- GAME -->
<div class="card" id="game">
  <div id="progress"></div>

  <h1 id="question"></h1>

  <div id="choices"></div>

  <h2 id="status"></h2>
  <h3 id="combo">🔥 Combo: 0</h3>

  <p id="score">Score: 0</p>
  <p id="accuracy">Accuracy: 0%</p>

  <button onclick="goMenu()">⬅ Menu</button>
</div>

<!-- DASHBOARD -->
<div class="card" id="dashboard">
  <h1>📊 RESULT</h1>
  <p id="finalScore"></p>
  <p id="finalAcc"></p>

  <canvas id="chart"></canvas>

  <table border="1">
    <tbody id="wrongTable"></tbody>
  </table>

  <button onclick="startGame()">Play Again</button>
  <button onclick="reviewWrong()">Review Wrong</button>
  <button onclick="goMenu()">⬅ Menu</button>
</div>

<script src="game.js"></script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
    .then(() => console.log("SW Registered"))
    .catch(err => console.log("SW Error", err));
}
</script>
</body>
</html>

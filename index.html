<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JLPT Simulator</title>

<!-- ✅ สำคัญ: รองรับมือถือ -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  margin: 0;
  padding: 10px;
}

/* ✅ กล่องหลัก responsive */
.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;

  width: 95%;
  max-width: 420px;

  margin: auto;
  margin-top: 20px;
}

/* ✅ ปุ่มเต็มจอ */
button {
  margin: 6px 0;
  padding: 12px;
  width: 100%;

  border-radius: 10px;
  border: none;
  background: #334155;
  color: white;

  cursor: pointer;
  font-size: 16px;
}

.selected {
  background: #22c55e !important;
}

/* ✅ progress bar */
#progress {
  height: 10px;
  background: red;
  width: 100%;
  margin-bottom: 10px;
  border-radius: 10px;
}

/* ซ่อนหน้า */
#game, #dashboard {
  display: none;
}

/* ✅ ขนาดตัวอักษร */
h1 {
  font-size: 28px;
}

h3 {
  font-size: 18px;
}

/* ✅ ตาราง */
table {
  width: 100%;
  margin-top: 10px;
  border-collapse: collapse;
}

td {
  padding: 5px;
  font-size: 14px;
}

/* ✅ มือถือจอเล็ก */
@media (max-width: 480px) {
  .card {
    padding: 15px;
  }

  h1 {
    font-size: 24px;
  }

  button {
    font-size: 15px;
  }
}
</style>
</head>

<body>

<!-- MENU -->
<div class="card" id="menu">
  <h1>🎮 JLPT Simulator</h1>

  <h3>Mode</h3>
  <button onclick="startMode('easy')">Easy</button>
  <button onclick="startMode('normal')">Normal</button>
  <button onclick="startMode('hard')">Hard</button>

  <h3>Lesson</h3>
  <div id="lessonList"></div>
</div>

<!-- GAME -->
<div class="card" id="game">
  <div id="progress"></div>

  <h1 id="question"></h1>

  <div id="choices"></div>

  <h2 id="status"></h2>
  <h3 id="combo">🔥 Combo: 0</h3>

  <p id="score">Score: 0</p>
  <p id="accuracy">Accuracy: 0%</p>

  <button onclick="goMenu()">⬅ Menu</button>
</div>

<!-- DASHBOARD -->
<div class="card" id="dashboard">
  <h1>📊 RESULT</h1>
  <p id="finalScore"></p>
  <p id="finalAcc"></p>

  <canvas id="chart"></canvas>

  <table border="1">
    <tbody id="wrongTable"></tbody>
  </table>

  <button onclick="startGame()">Play Again</button>
  <button onclick="reviewWrong()">Review Wrong</button>
  <button onclick="goMenu()">⬅ Menu</button>
</div>

<script src="game.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
    .then(() => console.log("SW Registered"))
    .catch(err => console.log("SW Error", err));
}
</script>

</body>
</html>
